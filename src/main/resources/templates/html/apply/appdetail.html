<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<link rel="stylesheet" th:href="@{css/toppage.css}">
<script	th:src="@{http://ajax.googleapis.com/ajax/libs/jquery/1.11.1/jquery.min.js}"></script>
<link rel="stylesheet" href="webjars/bootstrap/4.1.1/css/bootstrap.min.css" />
<script src="webjars/bootstrap/4.1.1/js/bootstrap.min.js"></script>
<title>応募確認</title>
</head>
<body>
	<header class="navbar navbar-expand-lg navbar-light">
		<a class="navbar-brand" href="/">応募管理</a>
	</header>
	<br>
	<main class="container">
		<div>

			<form action="/appcomp" method="post">
				<table class="table">
					<tr>
						<th>応募ID</th>
						<td th:text="${apps.appId}"></td>
					</tr>
					<tr>
						<th>応募内容</th>
						<td th:text="${apps.appName}"></td>
					</tr>
					<tr>
						<th>会社名</th>
						<td th:text="${apps.companyName}"></td>
					</tr>
					<tr>
						<th>職種</th>
						<td th:text="${apps.occupationName}"></td>
					</tr>
					<tr>
						<th>概要</th>
						<td th:text="${apps.appExplain}"></td>
					</tr>
				</table>
				<button class="button btn-primary" th:name="appid" th:value="${apps.appId}" >応募を完了する</button>
			</form>
			<br>
			<button onclick="history.back()" class="btn-primary">戻る</button>
		</div>
	</main>

</body>
</html>
